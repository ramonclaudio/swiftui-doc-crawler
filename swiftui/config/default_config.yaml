# API Configuration
base_url: "https://developer.apple.com"
docs_endpoint: "/tutorials/data/documentation/"

# Data Configuration
endpoint_file: "data/raw/endpoints.json"
processed_endpoint_file: "data/processed/processed_endpoints.json"

# Output Configuration
output_dir: "data/output"

# Markdown Content Configuration
include_links: False

# Section Controls
sections:
  title: True          # Title of the documentation
  abstract: True       # Abstract/overview section
  availability: False  # Platform availability information
  declaration: True    # Swift declarations
  parameters: True     # Function/method parameters
  discussion: True     # Discussion/content sections
  topics: False       # Related topics section
  relationships: True  # Protocol conformance and other relationships
  return_value: True   # Return value descriptions
  see_also: False     # See also section
  required: True      # Required flag marker
  details: True       # Details section
  notes: True         # Notes section

# Request Configuration
use_proxy: True
request_delay: 1.0
timeout: 30
max_retries: 3

# Endpoint Configuration
ignored_endpoints:
  - "/tutorials/swiftui"
  - "/tutorials/swiftui-concepts"
  - "/tutorials/sample-apps"
  - "/documentation/updates/swiftui"
  - "/documentation/visionos/destination-video"
  - "/documentation/visionos/world"
  - "/documentation/swiftui/backyard-birds-sample"
  - "/documentation/swiftui/food_truck_building_a_swiftui_multiplatform_app"
  - "/documentation/appclip/fruta_building_a_feature-rich_app_with_swiftui"
  - "/documentation/swiftui/migrating-to-the-swiftui-life-cycle"